# Build RoofHunter web dashboard and publish to GitHub Pages.
# After first run: Repo → Settings → Pages → Build and deployment → Source: GitHub Actions.
#
# Optional: Settings → Secrets and variables → Actions → Variables
#   DASHBOARD_API_URL = https://your-api.example.com   (no trailing slash)
# If unset, the SPA loads but /api calls go to github.io (use for UI-only demos).
name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - "web_dashboard/**"
      - ".github/workflows/deploy-github-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web_dashboard/package-lock.json

      - name: Install and build
        env:
          # Project site URL: https://<owner>.github.io/<repo>/
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_API_BASE: ${{ vars.DASHBOARD_API_URL }}
        working-directory: web_dashboard
        run: |
          npm ci
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web_dashboard/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
